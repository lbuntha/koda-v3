services:
  learner-web:
    build:
      context: .
      dockerfile: apps/learner-web/Dockerfile.dev
    container_name: koda-v3-learner-web
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - learner-node-modules:/app/node_modules
      - learner-web-node-modules:/app/apps/learner-web/node_modules
    depends_on:
      - api

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    container_name: koda-v3-api
    environment:
      KODA_API_ENV: local
      KODA_MONGODB_URI: mongodb://mongodb:27017
      KODA_MONGODB_DB: koda_v3
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api:/app/apps/api
    depends_on:
      - mongodb

  mongodb:
    image: mongo:7
    container_name: koda-v3-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db

volumes:
  mongodb-data:
  learner-node-modules:
  learner-web-node-modules:
