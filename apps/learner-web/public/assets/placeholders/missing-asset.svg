<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">Missing Koda asset placeholder</title>
  <desc id="desc">Clearly marked placeholder used when an asset key cannot be resolved during development.</desc>
  <rect width="256" height="256" rx="8" fill="#EEEDFE"/>
  <rect x="24" y="24" width="208" height="208" rx="8" fill="none" stroke="#534AB7" stroke-width="8" stroke-dasharray="14 10"/>
  <text x="128" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#26215C">Koda</text>
  <text x="128" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#E24B4A">Placeholder</text>
  <text x="128" y="173" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#26215C">Missing asset</text>
</svg>
